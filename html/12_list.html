<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <h1>목록 표시 : UL , OL</h1>
    <ul>
        <li>Unordered List</li>
        <li>Unordered List</li>
        <li>Unordered List</li>
        <li>Unordered List</li>
        <li>Unordered List</li>
    </ul>
    <!-- ul>li*10 이렇게 하면 li 태그 10개를 바로 만들 수 있다. -->
    <ol>
        <li>Unordered List</li>
        <li>Unordered List</li>
        <li>Unordered List</li>
        <li>Unordered List</li>
        <li>Unordered List</li>
    </ol>
    <!-- div>div*5 이 문법 역시 가능하다. -->
</body>
</html>
