<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO-Image</title>
    <meta name="description" content="SEO 기준 이미지를 로딩중 입니다.">
</head>
<body>
    <h1>Image</h1>
    <img src="../images/img01_seo.png" alt="img01" width="20%" height="20%" loading="lazy">
    <!-- width 값은 px 또는, % 수치를 사용한다. -->
    <img src="../images/1919.jpg" alt="movie poster" width="300px" height="400px" loading="lazy">
    <img src="https://picsum.photos/300/300" alt="dummy image" width="300" height="300" loading="lazy">
    <!-- 이미지 크기설정을 할 때 에는 width 와 height 를 같이 사용해 주는것이 좋다.
     loading 옵션의 'lazy' 속성은 페이지가 로드 되었을 때, 이미지를 로딩하는 옵션이다. -->
</body>
</html>
